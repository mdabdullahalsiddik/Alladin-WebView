name: alladin
description: "A new Flutter project."

publish_to: 'none' 


version: 1.0.0+5

environment:
  sdk: ^3.10.1


dependencies:
  flutter:
    sdk: flutter


  get: ^4.7.3
  flutter_easyloading: ^3.0.5
  package_info_plus:
  connectivity_plus: ^7.0.0
  flutter_inappwebview: ^6.1.5
  change_app_package_name: ^1.5.0
  in_app_update: ^4.2.5
dev_dependencies:

  flutter_launcher_icons: "^0.14.3"

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/app_icon.png"

  # Android adaptive icon background color
  adaptive_icon_background: "#FFFFFF"   # এখানে আপনার bg color
  adaptive_icon_foreground: "assets/app_icon.png"
  flutter_lints: ^6.0.0



flutter:
  uses-material-design: true

  assets:
    - assets/
